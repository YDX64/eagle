# ProBet Production Compose
#
# Strategy: build from local Dockerfile, bind to host 127.0.0.1:5051.
# Coolify-proxy (Traefik on host network) reaches us via the file-provider
# routing at /data/coolify/proxy/dynamic/probet.yaml.
#
# The container also joins the `coolify` Docker network so it can talk to
# `awa-postgres` (tracking DB). DNS name 'awa-postgres' resolves inside the
# network.

services:
  probet-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: probet-app:latest
    container_name: probet-app
    restart: unless-stopped
    # Bind to localhost — Traefik (host network) reaches via 127.0.0.1
    ports:
      - "127.0.0.1:5051:5000"
    networks:
      - default
      - coolify
    environment:
      NODE_ENV: production
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY}
      AWASTATS_API_KEY: ${AWASTATS_API_KEY}
      API_FOOTBALL_RATE_LIMIT: "900"
      # Prisma connection (unused by ProBet but required by schema)
      DATABASE_URL: "file:/app/data/probet.db"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: "https://pro.awastats.com"
      NEXT_PUBLIC_APP_URL: "https://pro.awastats.com"
      PORT: "5000"
      HOSTNAME: "0.0.0.0"
      # ─── Tracking PostgreSQL (awa-postgres via coolify network) ───
      PROBET_PG_HOST: awa-postgres
      PROBET_PG_PORT: "5432"
      PROBET_PG_DB: probet
      PROBET_PG_USER: awauser
      PROBET_PG_PASSWORD: ${PROBET_PG_PASSWORD}
      # L2 cache (Redis-compatible Dragonfly, shared across services via coolify net)
      REDIS_URL: "redis://awa-dragonfly:6379"
    volumes:
      - probet-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5000/api/probet/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1500M
          cpus: "1.5"
        reservations:
          memory: 512M

networks:
  default:
    name: probet_default
    driver: bridge
  coolify:
    external: true

volumes:
  probet-data:
    driver: local
